  .wrap{max-width:560px;margin:0 auto;padding:26px var(--gut) 80px;}
  .rh{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:6px;}
  .rh h1{font-size:24px;font-weight:800;letter-spacing:-.02em;}
  .sub{color:var(--muted);font-size:14px;margin-bottom:22px;}
  .rcard{background:#fff;border:1px solid var(--hair);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:20px;}
  .rcard video{width:100%;display:block;background:#000;max-height:70vh;}
  .rcard .cap{padding:16px 18px;font-size:14.5px;line-height:1.55;color:var(--ink-2);white-space:pre-wrap;}
  .rcard .meta{padding:0 18px 12px;font-size:12.5px;color:var(--muted);}
  .ract{display:flex;gap:10px;padding:0 18px 18px;}
  .ract .btn{flex:1;}
  .btn-go{background:#16a34a;color:#fff;border:0;}
  .btn-go:hover{background:#15803d;} .btn-go:disabled{opacity:.6;}
  .btn-no{background:#fff;color:#b91c1c;border:1px solid #fecaca;}
  .btn-no:hover{background:#fef2f2;}
  .empty{border:1.5px dashed var(--hair);border-radius:var(--r);background:#fff;padding:40px 24px;text-align:center;}
  .empty h3{font-size:18px;font-weight:700;} .empty p{color:var(--muted);margin-top:8px;font-size:14px;}

</head><body>
<main class="wrap">
  <div class="rh"><h1>Prompt of the Day · Review</h1><a class="navlink" href="/community/">Community →</a></div>
  <div class="sub">Approve to publish to the community feed, or reject to discard. Nothing here is public yet.</div>
  <div id="list"><p class="muted">Loading…</p></div>
</main>
<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
<script src="/js/config.js?v=8fd3a8ab23"></script>
<script src="/js/site.js?v=8fd3a8ab23"></script>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const CFG = window.BM_CONFIG || {};
const $ = (id) => document.getElementById(id);
const esc = (s)=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const toast = (m)=>{ try{ (window.BM&&BM.toast)?BM.toast(m):0; }catch(_){ } const t=$("toast"); if(t){t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);} };
function when(iso){ const d=new Date(iso); return isNaN(d)?"":d.toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); }

if(!CFG.SUPABASE_URL || !CFG.SUPABASE_KEY){ location.replace("/login/"); }
else {
  const supabase = createClient(CFG.SUPABASE_URL, CFG.SUPABASE_KEY);
  const { data:{ session } } = await supabase.auth.getSession();
  if(!session){ location.replace("/login/"); }
  else {
    const me = session.user;
    async function load(){
      const { data, error } = await supabase.from("ea_posts")
        .select("id, body, media_url, media_type, created_at, channel")
        .eq("author_id", me.id).eq("hidden", true).not("media_url","is",null)
        .order("created_at",{ ascending:false });
      const list = $("list");
      if(error){ list.innerHTML = `<div class="empty"><h3>Couldn't load</h3><p>${esc(error.message)}</p></div>`; return; }
      if(!data || !data.length){ list.innerHTML = `<div class="empty"><h3>Nothing to review 🎉</h3><p>When the daily Prompt-of-the-Day video renders, it shows up here for your approval.</p></div>`; return; }
      list.innerHTML = data.map(p=>`
        <div class="rcard" data-card="${p.id}">
          <video src="${esc(p.media_url)}" playsinline controls preload="metadata"></video>
          <div class="cap">${esc(p.body)}</div>
          <div class="meta">Staged ${esc(when(p.created_at))} · #${esc(p.channel)}</div>
          <div class="ract">
            <button class="btn btn-no" data-no="${p.id}">Reject</button>
            <button class="btn btn-go" data-go="${p.id}">Approve & publish</button>
          </div>
        </div>`).join("");
    }
    await load();

    document.addEventListener("click", async (e)=>{
      const go = e.target.closest("[data-go]"); const no = e.target.closest("[data-no]");
      if(go){
        go.disabled = true; go.textContent = "Publishing…";
        const id = go.getAttribute("data-go");
        const { error } = await supabase.from("ea_posts").update({ hidden:false }).eq("id", id);
        if(error){ go.disabled=false; go.textContent="Approve & publish"; toast("Couldn't publish: "+error.message); return; }
        const card = document.querySelector(`[data-card="${id}"]`); if(card) card.remove();
        toast("Published to the community ✅"); if(!document.querySelector(".rcard")) await load();
      }
      if(no){
        const id = no.getAttribute("data-no");
        if(!confirm("Discard this video? This can't be undone.")) return;
        no.disabled = true;
        const { error } = await supabase.from("ea_posts").delete().eq("id", id);
        if(error){ no.disabled=false; toast("Couldn't reject: "+error.message); return; }
        const card = document.querySelector(`[data-card="${id}"]`); if(card) card.remove();
        toast("Discarded."); if(!document.querySelector(".rcard")) await load();
      }
    });
  }
}
</script>
</body></html>
