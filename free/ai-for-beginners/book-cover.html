<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact;}
  body{width:720px;height:960px;font-family:'Inter',sans-serif;}
  .cover{width:720px;height:960px;background:linear-gradient(170deg,#ffffff,#eef3ff);
    padding:54px 48px;display:flex;flex-direction:column;align-items:center;text-align:center;
    border:1px solid #e4e9f1;position:relative;overflow:hidden;}
  .top{display:flex;align-items:center;gap:10px;}
  .top img{width:40px;height:40px;}
  .top span{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;letter-spacing:.04em;color:#0a1733;}
  .eyebrow{margin-top:30px;font-size:12px;font-weight:700;letter-spacing:.22em;color:#0b40e0;}
  h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:54px;line-height:.98;letter-spacing:-.02em;color:#0a1733;margin-top:14px;}
  h1 .b{color:#0b40e0;} h1 .g{color:#f2b705;}
  .sub{margin-top:18px;font-size:14px;font-weight:700;letter-spacing:.04em;color:#33415b;text-transform:uppercase;max-width:30ch;line-height:1.5;}
  .ill{width:330px;margin-top:14px;}
  .bar{width:74px;height:5px;border-radius:3px;background:linear-gradient(90deg,#fdc921,#f2b705);margin-top:8px;}
  .author{margin-top:auto;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;letter-spacing:.16em;color:#0a1733;}
  .pub{margin-top:6px;font-size:12px;font-weight:600;letter-spacing:.04em;color:#64748b;}
</style></head>
<body>
  <div class="cover">
    <div class="top"><img src="../../assets/logo-mark.png"><span>TAYLORMADE ACADEMY</span></div>
    <div class="eyebrow">FREE STARTER GUIDE</div>
    <h1>THE CREATOR'S<br><span class="b">AI</span> <span class="g">PLAYBOOK</span></h1>
    <div class="sub">How to use AI to create, earn, and grow your brand</div>
    <img class="ill" src="../../assets/ebook-ai-cover.png">
    <div class="bar"></div>
    <div class="author">NELSON TAYLOR</div>
    <div class="pub">academy.taylormadecreative.net</div>
  </div>
</body></html>
